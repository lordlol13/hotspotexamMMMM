name: Emergent CI/CD Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    name: Backend Pytest Suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: emergent_db_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openslide-tools libgl1-mesa-glx libglib2.0-0

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run Pytest Suite
        env:
          DATABASE_URL: postgresql://postgres:password123@localhost:5432/emergent_db_test
          JWT_SECRET: "ci-test-secret-key-super-long-hex-string-for-validation"
          ADMIN_EMAIL: "admin@emergent.edu"
          ADMIN_USERNAME: "admin"
          ADMIN_PASSWORD: "adminpassword"
          ADMIN_FULL_NAME: "System Admin"
          BACKEND_CORS_ORIGINS: "['http://localhost:3000']"
        run: |
          cd backend
          pytest

  frontend-check:
    name: Frontend Build and Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build
